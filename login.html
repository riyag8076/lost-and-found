<!DOCTYPE html>
<html>
<head>
  <title>Lost & Found</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<script>
  if (localStorage.getItem("user")) {
    window.location.href = "dashboard.html";
  }
</script>

<div class="left-text"> 
  <h1>Thapar's Lost & Found</h1>
  <p>Finding your belongings for you</p>
</div>

<div class="container">
  <div class="form-box">
    <div class="button-box">
      <button type="button" onclick="showLogin()">Login</button>
      <button type="button" onclick="showSignup()">Signup</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <h2>Login</h2>
      <input id="loginEmail" type="email" placeholder="Email" required>
      <input id="loginPassword" type="password" placeholder="Password" required>
      <p>
    If admin, 
    <a href="admin-login.html">click here!</a>
</p>
      <button type="submit">Login</button>
    </form>


    <!-- Signup Form -->
    <form id="signupForm" class="hidden">
      <h2>Signup</h2>
      <input id="signupName" type="text" placeholder="Name" required>
      <input id="signupEmail" type="email" placeholder="Email" required>
      <input id="signupPassword" type="password" placeholder="Password" required>
      <input id="signupConfirmPassword" type="password" placeholder="Confirm Password" required>
      <button type="submit">Signup</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
