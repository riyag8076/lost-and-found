<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;

    background: linear-gradient(rgba(185,185,185,0.7), rgba(255,187,132,0.7)),
                url("1.jpg") no-repeat center center/cover fixed;

    min-height: 100vh;
    text-align: center;
}

/* Header */
h2 {
    margin-top: 30px;
    font-size: 36px;
    color: #000;
}

/* ================================================= */
/* 🔘 MENU BUTTONS */
/* ================================================= */

.menu {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px 0;
}

.menu button {
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    background: black;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}

.menu button:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.menu button:active {
    transform: scale(0.95);
}

/* ================================================= */
/* 📦 CONTENT AREA */
/* ================================================= */
#adminList {
    width: 95%;
    max-width: 1100px;
    margin: 0 auto;

    display: flex;              /* 🔥 makes items horizontal */
    flex-wrap: wrap;            /* allows next row */
    justify-content: center;    /* center align */
    gap: 20px;                  /* space between cards */
}

/* ================================================= */
/* 🧾 ITEM CARDS */
/* ================================================= */
.item-card {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;

    width: 280px;              /* fixed card size */
    margin: 0;                 /* ❌ remove auto margin */

    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.item-card:hover {
    transform: translateY(-5px);
}

/* Text */
.item-card h3 {
    color: #000;
    margin-bottom: 10px;
}

.item-card p {
    color: #000;
    margin-bottom: 8px;
}

/* ================================================= */
/* 🎯 STATUS BADGES */
/* ================================================= */

.status-badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    color: white;
}

.status-badge.approved { background: green; }
.status-badge.returned { background: red; }
.status-badge.pending { background: orange; }

/* ================================================= */
/* 🔘 ACTION BUTTONS */
/* ================================================= */

.item-card button {
    margin: 8px 5px;
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: 0.2s;
}

.item-card button:hover {
    transform: scale(1.05);
}

.item-card button:first-of-type {
    background: #28a745;
    color: white;
}

.item-card button:last-of-type {
    background: #dc3545;
    color: white;
}

/* ================================================= */
/* 👋 WELCOME TEXT */
/* ================================================= */

.welcome {
    font-size: 20px;
    color: #000;
    margin-top: 40px;
}
  </style>
</head>

<body>

<h2>Admin Panel</h2>

<div class="menu">
  <button onclick="loadLost()">Show Lost</button>
  <button onclick="loadFound()">Show Found</button>
  <button onclick="showAccount()">Account</button>
</div>

<div id="adminList">
  <p class="welcome">Welcome Admin 👋<br>Select an option above</p>
</div>
<script>
const API = "http://localhost:3000";

let token = localStorage.getItem("token");

// fallback (temporary testing)
if (!token) {
  token = "PASTE_YOUR_TOKEN_HERE";
}

/* ================= LOAD LOST ================= */
async function loadLost() {
  try {
    const res = await fetch(`${API}/api/items/lost`, {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    console.log("STATUS:", res.status);

    const items = await res.json();
    console.log("DATA:", items);

    displayItems(items);

  } catch (err) {
    console.error("ERROR:", err);
    alert("Check console (F12)");
  }
}

/* ================= DISPLAY ================= */
function displayItems(items) {
  const list = document.getElementById("adminList");
  list.innerHTML = "";

  if (!items.length) {
    list.innerHTML = "<p>No items found</p>";
    return;
  }

  items.forEach(item => {
    list.innerHTML += `
  <div class="item-card">
    <h3>${item.title}</h3>
    <p>${item.description}</p>
  </div>
    `;
  });
}

/* ================= ACCOUNT ================= */
function showAccount() {
  document.getElementById("adminList").innerHTML = `
    <div class="item-card">
      <h3>Admin Account</h3>
      <p>Email: admin@test.com</p>
    </div>
  `;
}
</script>

</body>
</html>
