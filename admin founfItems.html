<!DOCTYPE html>
<html>
<head>
  <title>Found Items</title>
  <link rel="stylesheet" href="adminstye.css">
</head>
<body>

<h2>Found Items</h2>

<div id="items"></div>

<script>
fetch("http://localhost:3000/found")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("items");

  data.forEach(item => {
    container.innerHTML += `
      <div class="item-card">
        <h3>${item.title}</h3>
        <p>${item.description}</p>
        <p class="status ${item.status}">Status: ${item.status}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
